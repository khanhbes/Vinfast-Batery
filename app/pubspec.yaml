name: vinfast_battery
description: "VinFast Battery - Quản lý pin xe máy điện VinFast"
publish_to: 'none'
version: 1.0.55+56

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.9
  firebase_auth: ^5.5.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Charts
  fl_chart: ^0.70.2

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

  # Background Services
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.3

  # Location / GPS
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Local Notifications
  flutter_local_notifications: ^18.0.1

  # Shared Preferences (background service communication)
  shared_preferences: ^2.3.4

  # Secure storage for session metadata (selected vehicle, last login email)
  flutter_secure_storage: ^9.2.2
  
  # Timezone for scheduling notifications
  timezone: ^0.9.4
  
  # Connectivity for offline detection
  connectivity_plus: ^5.0.2
  
  # HTTP client for API calls
  http: ^1.2.2

  # Share CSV files via system share sheet
  share_plus: ^10.1.4

  # App version info + update
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  
  # Machine Learning
  tflite_flutter: ^0.10.4
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true  # Enable code generation for l10n
  assets:
    - assets/icons/
    - assets/vinfast_specs_fallback.json
    - assets/models/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#0F0F1A"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
